name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pytest
        run: uv run pytest tests/ -v

      - name: Rebuild the full pipeline end-to-end
        run: |
          uv run python -m src.hr_analytics.synthetic_hiring
          uv run python -m src.hr_analytics.load_db
          uv run python -m src.hr_analytics.run_queries
          uv run python -m src.hr_analytics.survival_model

      - name: Fail if the pipeline produced an untracked diff
        run: |
          git status --short
          if [ -n "$(git status --short -- data/processed sql/results docs/figures docs/ph_assumptions_check.txt)" ]; then
            echo "Pipeline output differs from what's committed -- regenerate and commit the updated artifacts."
            git diff --stat -- data/processed sql/results docs/figures docs/ph_assumptions_check.txt
            exit 1
          fi
