name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pytest
        run: uv run pytest tests/ -v

      - name: Rebuild the full pipeline end-to-end
        run: |
          uv run python -m src.hr_analytics.synthetic_hiring
          uv run python -m src.hr_analytics.load_db
          uv run python -m src.hr_analytics.run_queries
          uv run python -m src.hr_analytics.survival_model

      - name: Check regenerated PNGs still exist and are non-trivial
        # PNG bytes aren't guaranteed reproducible across platforms (font
        # rendering/anti-aliasing and embedded library-version metadata can
        # differ even with identical underlying data), so these are checked
        # for existence/size, not byte-for-byte equality like the rest.
        run: |
          for f in docs/figures/km_overall.png docs/figures/km_by_overtime.png; do
            size=$(stat -c%s "$f")
            echo "$f: $size bytes"
            if [ "$size" -lt 10000 ]; then
              echo "$f is suspiciously small ($size bytes) -- likely didn't render correctly."
              exit 1
            fi
          done

      - name: Fail if data generation or SQL output differs from what's committed
        # Only the genuinely bit-reproducible outputs: seeded-RNG synthetic
        # data and pure-SQL aggregates. Deliberately excludes anything
        # produced by CoxPHFitter's iterative optimizer (coefficients, risk
        # scores, metrics, the PH-assumption test) -- those can converge to
        # meaningfully different values across BLAS backends/platforms even
        # with a fixed seed and rounded output, which is a well-known
        # floating-point reproducibility limit, not a bug. Correctness for
        # those is enforced by tests/test_survival_model.py's invariant
        # checks instead of exact-value matching.
        run: |
          git status --short
          if [ -n "$(git status --short -- data/processed/synthetic_hiring_pipeline.csv data/processed/hr_employee_attrition_enriched.csv sql/results)" ]; then
            echo "Deterministic pipeline output differs from what's committed -- regenerate and commit the updated artifacts."
            git diff --stat -- data/processed/synthetic_hiring_pipeline.csv data/processed/hr_employee_attrition_enriched.csv sql/results
            exit 1
          fi
